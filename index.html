<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Chrono Pro V9.20 – PWA & multilingue</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;}
  body{font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;margin:0;background:#f0f0f0;padding:20px 0}
  #workout-container{text-align:center;background:white;padding:25px;border-radius:12px;box-shadow:0 6px 12px rgba(0,0,0,.15);max-width:600px;width:90%}
  #image-container{width:100%;display:flex;gap:10px;justify-content:center;margin-bottom:20px}
  #image-container.single{display:block}
  #image-container img{width:100%;max-width:300px;height:auto;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
  #image-container.double{display:flex;width:100%;max-width:600px;margin:0 auto;align-items:center}
  #image-container.double > div{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
  #image-container.double img{width:100%;height:auto;min-height:200px;max-height:280px;object-fit:contain}
  .image-label{font-size:12px;color:#666;margin-top:5px}
  #timer{font-size:56px;font-weight:bold;margin:20px 0;color:#007bff}
  #exercise-info,#series-info,#status{font-size:20px;margin:10px 0;font-weight:600}
  #series-info{color:#555;font-weight:400}
  button{padding:12px 20px;font-size:16px;margin:6px 4px;cursor:pointer;border:none;border-radius:6px;background:#007bff;color:white;transition:all .2s}
  button:hover{background:#0056b3}
  .config-panel{display:none;margin-top:25px;padding:20px;background:#f8f9fa;border-radius:10px;text-align:left}
  .advanced-zone{background:#e9ecef;border-radius:8px;padding:15px;margin-top:15px}
  .program-select{width:100%;padding:8px;margin:10px 0;border-radius:6px}
  .help{font-size:13px;color:#666;margin-top:5px}
  .error-msg{color:#dc3545;font-size:14px;margin-top:10px;display:none}
  .version{color:#007bff;font-size:13px;margin-top:10px}
  .flex-buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
  .clean-btn{background:#6c757d;}
  #autosave-status{font-size:13px;color:green;margin-top:8px;opacity:0;transition:opacity 0.5s;}
  #total-time-info{margin-top:10px;font-weight:bold;}
  .img-loader{display:inline-block;width:20px;height:20px;border:2px solid #ccc;border-top-color:#007bff;border-radius:50%;animation:spin 0.6s linear infinite;}
  #lang-wrapper{display:flex;align-items:center;gap:8px;margin-bottom:12px;justify-content:center;flex-wrap:wrap}
  #lang-select{padding:6px 10px;border-radius:6px;border:1px solid #ccc;font-size:15px;background:white;cursor:pointer}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (max-width: 480px) and (orientation: landscape){#timer{font-size:32px;margin:10px 0}button{padding:6px 10px;font-size:12px}#image-container.double img{max-height:120px}#workout-container{padding:15px}}
  @media (max-width: 380px){.flex-buttons button{padding:8px 12px;font-size:13px}#timer{font-size:40px}}
</style>
</head>
<body>
<div id="workout-container">
  <div id="lang-wrapper">
    <label for="lang-select" style="font-size:16px">🌐</label>
    <select id="lang-select">
      <option value="fr">🇫🇷 Français</option>
      <option value="en">🇬🇧 English</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="es">🇪🇸 Español</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="pl">🇵🇱 Polski</option>
      <option value="tr">🇹🇷 Türkçe</option>
    </select>
  </div>

  <div id="image-container" class="single">
    <div><img id="current-image" src="https://i.imgur.com/IHCEoad.png" alt="Exercice"><div id="current-label" class="image-label"></div><div id="current-loader" class="img-loader" style="display:none"></div></div>
    <div id="next-image-wrapper" style="display:none"><img id="next-image" src="" alt="Prochain exercice"><div class="image-label" data-i18n="nextExercise">Prochain exercice</div><div id="next-loader" class="img-loader" style="display:none"></div></div>
  </div>
  <div id="exercise-info">Préparation</div>
  <div id="series-info"></div>
  <div id="timer">00:15</div>
  <div id="status">Prêt</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="flex-buttons">
    <button id="prev-btn" data-i18n="prev">◀ Précédent</button>
    <button id="next-btn" data-i18n="next">Suivant ▶</button>
  </div>
  <button id="start-btn" style="font-size:18px;padding:16px 40px" data-i18n="start">▶ Démarrer</button>
  <button id="pause-btn" data-i18n="pause">⏸ Pause</button>
  <button id="reset-btn" data-i18n="reset">⟳ Réinitialiser</button>
  <button id="config-btn" data-i18n="config">⚙ Configurer</button>
  <div id="autosave-status"></div>
  <div class="version">Chrono Pro V9.20</div>
</div>

<div id="config-panel" class="config-panel">
  <h3 data-i18n="configTitle">Configuration</h3>
  <div style="margin-bottom:10px">
    <label for="setup-time" data-i18n="setupLabel">Mise en place (secondes) :</label>
    <input type="number" id="setup-time" value="15" min="0" style="margin-left:8px;width:70px">
  </div>
  <div>
    <label for="voice-toggle">
      <input type="checkbox" id="voice-toggle">
      <span data-i18n="voiceLabel">Synthèse vocale</span>
    </label>
  </div>
  <div style="margin-top:15px">
    <label for="sequence-input"><strong data-i18n="sequenceLabel">Séquence d'entraînement :</strong></label>
    <input type="text" id="sequence-input" style="width:100%;padding:8px;font-family:monospace;margin-top:5px">
    <div class="help" data-i18n="sequenceHelp">Exemple : 30x(4:10-P10)-P30</div>
  </div>
  <div id="total-time-info"></div>
  <div class="advanced-zone">
    <details>
      <summary><strong data-i18n="advancedTitle">📁 Gestion des programmes (avancé)</strong></summary>
      <label for="program-select" data-i18n="programsLabel">Programmes sauvegardés :</label>
      <select id="program-select" class="program-select"><option value="">-- Charger --</option></select>
      <div class="flex-buttons">
        <button id="save-program-btn" data-i18n="saveProgram">💾 Sauvegarder</button>
        <button id="delete-program-btn" data-i18n="deleteProgram">🗑 Supprimer</button>
      </div>
      <div class="flex-buttons" style="margin-top:10px">
        <button id="export-program-btn" data-i18n="exportProgram">📤 Exporter séquence</button>
        <button id="import-program-btn" data-i18n="importProgram">📥 Importer séquence</button>
        <button id="export-week-btn" data-i18n="exportWeek">📄 Exporter texte</button>
        <button id="export-all-programs-btn" data-i18n="exportAllPrograms">📦 Exporter tous</button>
        <button id="import-programs-btn" data-i18n="importPrograms">📥 Importer programmes</button>
        <button id="export-full-btn" data-i18n="exportFull">💾 Exporter config</button>
        <button id="import-full-btn" data-i18n="importFull">📥 Importer config</button>
        <button id="clean-exercises-btn" class="clean-btn" data-i18n="cleanExercises">🧹 Nettoyer</button>
      </div>
    </details>
  </div>
  <h4 data-i18n="exerciseListTitle">📋 Liste des exercices</h4>
  <div id="exercise-list" style="max-height:200px;overflow-y:auto;border:1px solid #ddd;padding:8px;background:white"></div>
  <div class="flex-buttons">
    <button id="add-exercise-btn" data-i18n="addExercise">+ Ajouter un exercice</button>
    <button id="save-config-btn" data-i18n="saveConfig">💾 Sauvegarder</button>
  </div>
</div>

const LANG_NAMES = {
  fr:'Français', en:'English', de:'Deutsch', es:'Español', it:'Italiano',
  pt:'Português', zh:'中文', ja:'日本語', ko:'한국어',
  ar:'العربية', ru:'Русский', nl:'Nederlands', pl:'Polski', tr:'Türkçe'
};
const VOICE_LANGS = {fr:'fr-FR',en:'en-US',de:'de-DE',es:'es-ES',it:'it-IT',pt:'pt-BR',zh:'zh-CN',ja:'ja-JP',ko:'ko-KR',ar:'ar-SA',ru:'ru-RU',nl:'nl-NL',pl:'pl-PL',tr:'tr-TR'};

let currentLang = localStorage.getItem('chronoPro_lang') || 'fr';
let currentTr = BASE_TR[currentLang] || BASE_TR['fr'];

function t(key){ return currentTr[key] || BASE_TR['fr'][key] || key; }

// Application des traductions à l'interface
function applyTranslations(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    if(el.children.length===0) el.innerText=t(el.dataset.i18n);
  });
  const progSel=document.getElementById('program-select');
  if(progSel&&progSel.options[0]) progSel.options[0].textContent=t('loadProgram');
  updateDisplay();
  updateTotalTimeDisplay();
}

// Changement de langue
function setLanguage(langCode){
  if(BASE_TR[langCode]){
    currentLang=langCode;
    currentTr=BASE_TR[langCode];
    localStorage.setItem('chronoPro_lang',langCode);
    applyTranslations();
    if(window.speechSynthesis) window.speechSynthesis.cancel();

let audioCtx=null, lastBeepTime=0, voiceEnabled=false;
function getAudioContext(){ if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); document.body.addEventListener('touchstart',()=>audioCtx.resume(),{once:true}); document.body.addEventListener('click',()=>audioCtx.resume(),{once:true}); } return audioCtx; }
function beep(freq=800,dur=200){ try{ let now=Date.now(); if(now-lastBeepTime<50)return; lastBeepTime=now; let ctx=getAudioContext(); let o=ctx.createOscillator(); let g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=freq; o.type='sine'; g.gain.setValueAtTime(0.001,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.4,ctx.currentTime+0.01); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000); o.start(); o.stop(ctx.currentTime+dur/1000); }catch(e){} }

let exercises=[], sequenceInputValue="", setupTime=15;
let isSetupPhase=true, currentBlockIndex=-1, timeLeft=0, timerInterval=null, isPaused=false;
let isTempoMode=false, tempoInterval=null, currentRep=0, currentPhase=0, tempoPhases=[0,0,0,0], tempoOriginal=[0,0,0,0], totalReps=0;
let savedPrograms=[];

// ===== PARSER (identique à l'original) =====
function parseExToken(tok){ let m=tok.match(/^(\d+):(\d+)$/); if(m)return{type:'exercise',id:parseInt(m[1]),duration:parseInt(m[2])}; m=tok.match(/^(\d+):(\d+)@(\d+-\d+-\d+-\d+)$/); if(m)return{type:'exercise',id:parseInt(m[1]),reps:parseInt(m[2]),tempo:m[3]}; throw new Error(`Format: ${tok}`); }
function parseSequence(input){
  try{
    let tokens=input.replace(/\s/g,'').match(/\d+x\(|P\d+|\d+(?::\d+(?:@\d+-\d+-\d+-\d+)?)?|\(|\)/g)||[];
    if(!tokens.length)throw new Error("Vide");
    let stack=[{blocks:[],mult:1}]; let i=0;
    while(i<tokens.length){
      let tok=tokens[i];
      if(/^\d+x\(/.test(tok)){stack.push({blocks:[],mult:parseInt(tok)});i++;continue;}
      if(tok==')'){ let cur=stack.pop(); let par=stack[stack.length-1]; for(let r=0;r<cur.mult;r++)par.blocks.push(...cur.blocks); i++;continue; }
      if(tok.toUpperCase().startsWith('P')){stack[stack.length-1].blocks.push({type:'rest',duration:parseInt(tok.slice(1))});i++;continue;}
      if(tok!='('&&tok!='+') stack[stack.length-1].blocks.push(parseExToken(tok));
      i++;
    }
    if(stack.length>1)throw new Error("Parenthèse");
    return stack[0].blocks;
  }catch(e){showError("Séquence: "+e.message);return[];}
}
function totalTime(){ let blocks=parseSequence(sequenceInputValue),total=setupTime; for(let i=0;i<blocks.length;i++){let b=blocks[i];if(b.type=='rest'&&i==blocks.length-1)continue;if(b.type=='exercise'){if(b.duration)total+=b.duration;else if(b.reps&&b.tempo){let parts=b.tempo.split('-').map(Number);total+=parts.reduce((a,c)=>a+c,0)*b.reps;}else total+=30;}else total+=b.duration;}return total; }
function formatMMSS(s){ return `${Math.floor(s/60)}`.padStart(2,'0')+':'+`${s%60}`.padStart(2,'0'); }
function updateTotalTimeDisplay(){ let total=totalTime(),el=document.getElementById("total-time-info"); if(el)el.innerHTML=`${t('totalDuration')} : ${Math.floor(total/60)}m ${total%60}s`; }

function setImageWithLoader(img,src,lid){ let l=document.getElementById(lid); if(l)l.style.display='inline-block'; img.style.opacity='0.5'; let t2=new Image(); t2.onload=()=>{img.src=src;img.style.opacity='1';if(l)l.style.display='none';}; t2.onerror=()=>{if(l)l.style.display='none';img.style.opacity='1';}; t2.src=src; }

// ===== TEMPO =====
function startTempoMode(block){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} if(tempoInterval)clearInterval(tempoInterval); isTempoMode=true;isPaused=false; let parts=block.tempo.split('-').map(Number); tempoOriginal=[...parts];tempoPhases=[...parts]; totalReps=block.reps;currentRep=1;currentPhase=0; updateTempoDisplay(); tempoInterval=setInterval(tempoTick,1000); }
function tempoTick(){ if(isPaused)return; if(tempoPhases[currentPhase]===0){nextPhase();return;} tempoPhases[currentPhase]--; if(currentPhase===0)beep(300,80);else if(currentPhase===2)beep(800,80);else beep(500,40); updateTempoDisplay(); if(tempoPhases[currentPhase]===0)nextPhase(); }
function nextPhase(){ if(isPaused)return; currentPhase++; if(currentPhase>=4){currentRep++;if(currentRep>totalReps){stopTempoMode();advanceBlock();return;}currentPhase=0;tempoPhases=[...tempoOriginal];updateTempoDisplay();beep(1000,100);}else tempoPhases=[...tempoOriginal]; }
function updateTempoDisplay(){ const ph=["⬇️ DESC","⏸️ BAS","⬆️ MONT","⏸️ HAUT"]; document.getElementById("timer").innerHTML=`<span style="font-size:28px">${currentRep}/${totalReps}</span><br><span style="font-size:24px">${ph[currentPhase]} ${tempoPhases[currentPhase]}s</span>`; document.getElementById("status").innerHTML=t('tempoMode'); }
function stopTempoMode(){ if(tempoInterval)clearInterval(tempoInterval); isTempoMode=false; document.getElementById("timer").style.fontSize="56px"; }

// ===== AFFICHAGE =====
function getExerciseById(id){ return exercises.find(e=>e.id===id); }
function updateDisplay(){
  let cont=document.getElementById("image-container"),curImg=document.getElementById("current-image"),curLabel=document.getElementById("current-label"),nextWrap=document.getElementById("next-image-wrapper"),nextImg=document.getElementById("next-image");
  let info=document.getElementById("exercise-info"),series=document.getElementById("series-info"),statusDiv=document.getElementById("status");
  if(!cont||!info)return;
  if(isSetupPhase){
    cont.className="single";nextWrap.style.display="none";
    setImageWithLoader(curImg,"https://i.imgur.com/IHCEoad.png","current-loader");
    curLabel.textContent="";info.innerHTML=t('preparation');series.innerHTML="";statusDiv.innerHTML=t('setupPhase');
    if(!isTempoMode)document.getElementById("timer").innerHTML=formatMMSS(timeLeft);
    return;
  }
  let blocks=parseSequence(sequenceInputValue);
  if(currentBlockIndex>=blocks.length){
    cont.className="single";nextWrap.style.display="none";
    setImageWithLoader(curImg,"https://i.imgur.com/0pazk7c.png","current-loader");
    curLabel.textContent="";info.innerHTML=t('finished');series.innerHTML=t('completed');statusDiv.innerHTML=t('wellDone');
    return;
  }
  let block=blocks[currentBlockIndex];
  series.innerHTML=`${t('blockLabel')} ${currentBlockIndex+1} / ${blocks.length}`;
  if(block.type==='exercise'){
    let ex=getExerciseById(block.id); if(!ex)return;
    setImageWithLoader(curImg,ex.image||"https://via.placeholder.com/300?text=Exo","current-loader");
    curLabel.textContent="";
    if(block.duration!==undefined){info.innerHTML=`${ex.name} (${ex.reps}) [${block.duration}s]`;statusDiv.innerHTML=t('workDuration');if(!isTempoMode)document.getElementById("timer").innerHTML=formatMMSS(timeLeft);cont.className="single";nextWrap.style.display="none";}
    else if(block.tempo&&block.reps){info.innerHTML=`${ex.name} (${block.reps} reps @ ${block.tempo})`;if(!isTempoMode)document.getElementById("timer").innerHTML=t('ready');cont.className="single";nextWrap.style.display="none";}
  } else {
    info.innerHTML=t('rest');setImageWithLoader(curImg,"https://i.imgur.com/IHCEoad.png","current-loader");
    curLabel.textContent=t('rest');statusDiv.innerHTML=`${t('restDuration')} ${block.duration}s`;
    document.getElementById("timer").innerHTML=formatMMSS(timeLeft);
    let ni=currentBlockIndex+1;
    if(ni<blocks.length&&blocks[ni].type==='exercise'){let nex=getExerciseById(blocks[ni].id);if(nex){cont.className="double";nextWrap.style.display="block";setImageWithLoader(nextImg,nex.image||"https://via.placeholder.com/300?text=Suivant","next-loader");}else{cont.className="single";nextWrap.style.display="none";}}
    else{cont.className="single";nextWrap.style.display="none";}
  }
}

// ===== LOGIQUE =====
function advanceBlock(){
  if(isTempoMode)stopTempoMode();
  currentBlockIndex++;
  let blocks=parseSequence(sequenceInputValue);
  if(currentBlockIndex>=blocks.length){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}beep(1200,400);setTimeout(()=>beep(1400,400),500);setTimeout(()=>beep(1600,800),1000);updateDisplay();return;}
  let block=blocks[currentBlockIndex];
  if(block.type==='rest'&&currentBlockIndex===blocks.length-1){currentBlockIndex=blocks.length;if(timerInterval){clearInterval(timerInterval);timerInterval=null;}beep(1200,400);setTimeout(()=>beep(1400,400),500);setTimeout(()=>beep(1600,800),1000);updateDisplay();return;}
  if(block.type==='exercise'){if(block.tempo&&block.reps){startTempoMode(block);updateDisplay();return;}else{let ex=getExerciseById(block.id);timeLeft=block.duration!==undefined?block.duration:(ex?.workTime||30);beep(880,350);}}
  else{timeLeft=block.duration;beep(660,450);}
  updateDisplay();
  if(!isTempoMode&&!isPaused){if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(timerTick,1000);}
}
function timerTick(){ if(isPaused)return; if(timeLeft<=5&&timeLeft>0)beep(440+timeLeft*80,120); if(timeLeft>0){timeLeft--;document.getElementById("timer").innerHTML=formatMMSS(timeLeft);return;} if(isSetupPhase){isSetupPhase=false;currentBlockIndex=-1;beep(1000,500);}advanceBlock(); }
function startWorkout(){
  getAudioContext(); if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(isPaused){isPaused=false;if(isTempoMode&&tempoInterval===null)tempoInterval=setInterval(tempoTick,1000);else if(!isTempoMode&&timerInterval===null)timerInterval=setInterval(timerTick,1000);document.getElementById("start-btn").innerHTML=t('start');updateDisplay();return;}
  if((isTempoMode&&tempoInterval!==null)||(!isTempoMode&&timerInterval!==null))return;
  if(isSetupPhase){resetWorkoutInternal();timerInterval=setInterval(timerTick,1000);updateDisplay();document.getElementById("start-btn").innerHTML=t('start');return;}
  let blocks=parseSequence(sequenceInputValue);
  if(currentBlockIndex>=0&&currentBlockIndex<blocks.length){let block=blocks[currentBlockIndex];if(block.type==='exercise'&&block.tempo&&block.reps){startTempoMode(block);updateDisplay();return;}else{if(timerInterval)clearInterval(timerInterval);timerInterval=setInterval(timerTick,1000);updateDisplay();}}
  else{resetWorkoutInternal();timerInterval=setInterval(timerTick,1000);updateDisplay();}
  document.getElementById("start-btn").innerHTML=t('start');
}
function resetWorkoutInternal(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;}if(tempoInterval){clearInterval(tempoInterval);tempoInterval=null;}isTempoMode=false;isSetupPhase=true;currentBlockIndex=-1;timeLeft=setupTime;isPaused=false; }
function resetWorkout(){ resetWorkoutInternal(); document.getElementById("start-btn").innerHTML=t('start'); updateDisplay(); }
function pauseWorkout(){
  if(isTempoMode){if(tempoInterval){clearInterval(tempoInterval);tempoInterval=null;}isPaused=true;document.getElementById("status").innerHTML=t('pauseTempo');document.getElementById("start-btn").innerHTML=t('resume');return;}
  if(!timerInterval)return; clearInterval(timerInterval);timerInterval=null;isPaused=true;document.getElementById("status").innerHTML=t('pauseStatus');document.getElementById("start-btn").innerHTML=t('resume');
}
function prevBlock(){
  let blocks=parseSequence(sequenceInputValue); if(!blocks.length)return;
  if(isTempoMode)stopTempoMode(); if(timerInterval){clearInterval(timerInterval);timerInterval=null;} isPaused=false;
  if(isSetupPhase){updateDisplay();return;}
  let ni=currentBlockIndex-1;
  if(ni<0){isSetupPhase=true;currentBlockIndex=-1;timeLeft=setupTime;updateDisplay();return;}
  currentBlockIndex=ni; let block=blocks[ni];
  if(block.type==='exercise'){if(block.tempo&&block.reps)timeLeft=0;else{let ex=getExerciseById(block.id);timeLeft=block.duration!==undefined?block.duration:(ex?.workTime||30);}}else timeLeft=block.duration;
  updateDisplay();
}
function nextBlock(){
  let blocks=parseSequence(sequenceInputValue); if(!blocks.length)return;
  if(isTempoMode)stopTempoMode(); if(timerInterval){clearInterval(timerInterval);timerInterval=null;} isPaused=false;
  if(isSetupPhase){isSetupPhase=false;currentBlockIndex=0;let block=blocks[0];if(block.type==='exercise'){if(block.tempo&&block.reps)timeLeft=0;else{let ex=getExerciseById(block.id);timeLeft=block.duration!==undefined?block.duration:(ex?.workTime||30);}}else timeLeft=block.duration;updateDisplay();return;}
  let ni=currentBlockIndex+1; if(ni>=blocks.length){updateDisplay();return;}
  currentBlockIndex=ni; let block=blocks[ni];
  if(block.type==='exercise'){if(block.tempo&&block.reps)timeLeft=0;else{let ex=getExerciseById(block.id);timeLeft=block.duration!==undefined?block.duration:(ex?.workTime||30);}}else timeLeft=block.duration;
  updateDisplay();
}

function cleanSequenceFromMissingIds(){ let blocks=parseSequence(sequenceInputValue),validIds=new Set(exercises.map(e=>e.id)),modified=false,nb=[]; for(let bl of blocks){if(bl.type==='exercise'&&!validIds.has(bl.id)){modified=true;continue;}nb.push(bl);} if(modified){let pts=[];for(let bl of nb){if(bl.type==='rest')pts.push(`P${bl.duration}`);else if(bl.duration!==undefined)pts.push(`${bl.id}:${bl.duration}`);else if(bl.tempo&&bl.reps)pts.push(`${bl.id}:${bl.reps}@${bl.tempo}`);}sequenceInputValue=pts.join('-');document.getElementById("sequence-input").value=sequenceInputValue;showAutoSave(t('seqCleaned'));saveAll();} }

function importFull(file){ let reader=new FileReader(); reader.onload=ev=>{try{let data=JSON.parse(ev.target.result);exercises=data.exercises||[];sequenceInputValue=data.sequence||sequenceInputValue;setupTime=data.setupTime||setupTime;voiceEnabled=data.voiceEnabled||false;savedPrograms=data.savedPrograms||[];localStorage.setItem('chronoPro_exercises',JSON.stringify(exercises));localStorage.setItem('chronoPro_sequence',sequenceInputValue);localStorage.setItem('chronoPro_setupTime',setupTime);localStorage.setItem('chronoPro_voice',voiceEnabled);localStorage.setItem('chronoPro_savedPrograms',JSON.stringify(savedPrograms));renderExercises();document.getElementById("sequence-input").value=sequenceInputValue;document.getElementById("setup-time").value=setupTime;document.getElementById("voice-toggle").checked=voiceEnabled;loadSavedPrograms();resetWorkout();updateTotalTimeDisplay();alert(t('importComplete'));}catch(err){alert(t('invalidFile')+": "+err.message);}};reader.readAsText(file); }

function saveAll(){ localStorage.setItem('chronoPro_exercises',JSON.stringify(exercises));localStorage.setItem('chronoPro_sequence',sequenceInputValue);localStorage.setItem('chronoPro_setupTime',setupTime);localStorage.setItem('chronoPro_voice',voiceEnabled);updateTotalTimeDisplay();showAutoSave(t('saved'));updateDisplay(); }
function showAutoSave(msg){ let el=document.getElementById("autosave-status");if(el){el.textContent=msg;el.style.opacity=1;setTimeout(()=>el.style.opacity=0,2500);}else console.log(msg); }
function showError(msg){ let el=document.getElementById("error-msg");if(el){el.textContent=msg;el.style.display="block";setTimeout(()=>el.style.display="none",6000);} }
function syncSeq(){ let v=document.getElementById("sequence-input").value;if(v!==sequenceInputValue){sequenceInputValue=v;updateTotalTimeDisplay();resetWorkout();} }
function syncSetup(){ let v=parseInt(document.getElementById("setup-time").value);if(!isNaN(v)&&v!==setupTime){setupTime=v;updateTotalTimeDisplay();resetWorkout();} }
function syncVoice(){ voiceEnabled=document.getElementById("voice-toggle").checked;localStorage.setItem('chronoPro_voice',voiceEnabled);if(voiceEnabled&&window.speechSynthesis)speak(t('ready')); }

// ===== INIT =====
function init(){
  let stored=localStorage.getItem('chronoPro_exercises');
  if(stored){try{exercises=JSON.parse(stored);}catch(e){exercises=[];}}
  exercises=exercises.filter(ex=>ex&&typeof ex.name==='string'&&ex.name.trim()!==''&&ex.name!=='undefined'&&ex.name!=='null');
  if(!exercises.length){
    exercises=[
      {name:"1. Dips lestés",reps:"3–5 reps",workTime:40,image:"https://fitnessprogramer.com/wp-content/uploads/2022/07/Ring-Dips.gif"},
      {name:"2. Pompes piquées / HSPU",reps:"4–6 reps",workTime:40,image:"https://fitnessprogramer.com/wp-content/uploads/2021/06/Bench-Pike-Push-up.gif"},
    ].map((ex,i)=>({id:i+1,uid:uuid(),name:ex.name,reps:ex.reps,workTime:ex.workTime,image:ex.image}));
    localStorage.setItem('chronoPro_exercises',JSON.stringify(exercises));
  }
  for(let ex of exercises)if(!ex.uid)ex.uid=uuid();

  sequenceInputValue=localStorage.getItem('chronoPro_sequence')||"30x(4:10-P10)-P30-30x(11:10-P20)-P30-10x(15:40-P30)";
  setupTime=parseInt(localStorage.getItem('chronoPro_setupTime'))||15;
  voiceEnabled=localStorage.getItem('chronoPro_voice')==='true';

  // Restaurer langue
  const savedLang=localStorage.getItem('chronoPro_lang');
  if(savedLang && BASE_TR[savedLang]) setLanguage(savedLang);
  else setLanguage('fr');
  document.getElementById("lang-select").value=currentLang;

  cleanSequenceFromMissingIds();
  document.getElementById("sequence-input").value=sequenceInputValue;
  document.getElementById("setup-time").value=setupTime;
  document.getElementById("voice-toggle").checked=voiceEnabled;
  applyTranslations();

  document.getElementById("sequence-input").addEventListener("input",syncSeq);
  document.getElementById("setup-time").addEventListener("input",syncSetup);
  document.getElementById("voice-toggle").addEventListener("change",syncVoice);

  loadSavedPrograms(); renderExercises(); resetWorkout(); updateTotalTimeDisplay();

  document.getElementById("prev-btn").onclick=prevBlock;
  document.getElementById("next-btn").onclick=nextBlock;
  document.getElementById("start-btn").onclick=startWorkout;
  document.getElementById("pause-btn").onclick=pauseWorkout;
  document.getElementById("reset-btn").onclick=resetWorkout;
  document.getElementById("config-btn").onclick=()=>{let p=document.getElementById("config-panel");p.style.display=p.style.display==="block"?"none":"block";if(p.style.display==="block"){document.getElementById("sequence-input").value=sequenceInputValue;document.getElementById("setup-time").value=setupTime;document.getElementById("voice-toggle").checked=voiceEnabled;renderExercises();}};
  document.getElementById("add-exercise-btn").onclick=()=>addExercise();
  document.getElementById("save-config-btn").onclick=saveAll;
  document.getElementById("save-program-btn").onclick=saveCurrentProgram;
  document.getElementById("delete-program-btn").onclick=deleteSelectedProgram;
  document.getElementById("program-select").onchange=loadSelectedProgram;
  document.getElementById("export-program-btn").onclick=exportProgram;
  document.getElementById("import-program-btn").onclick=()=>{let i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{if(e.target.files[0])importProgramFile(e.target.files[0]);};i.click();};
  document.getElementById("export-week-btn").onclick=exportWeekText;
  document.getElementById("export-full-btn").onclick=exportFull;
  document.getElementById("import-full-btn").onclick=()=>{let i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{if(e.target.files[0])importFull(e.target.files[0]);};i.click();};
  document.getElementById("clean-exercises-btn").onclick=()=>{cleanInvalidExercises();cleanSequenceFromMissingIds();resetWorkout();updateTotalTimeDisplay();};
  document.getElementById("export-all-programs-btn").onclick=exportAllPrograms;
  document.getElementById("import-programs-btn").onclick=()=>{let i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{if(e.target.files[0])importPrograms(e.target.files[0]);};i.click();};

  document.getElementById("lang-select").addEventListener("change", (e)=>setLanguage(e.target.value));

  if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').then(r=>console.log('SW ok',r)).catch(e=>console.log('SW err',e));
}
init();
</script>
</body>
</html>
